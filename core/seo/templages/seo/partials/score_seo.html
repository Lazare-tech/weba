<div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">

    <div class="flex items-center justify-between mb-4">
        <h4 class="font-medium text-gray-800">Score SEO de cet article</h4>
        <span class="text-2xl font-bold
            {% if resultat.score >= 80 %}text-emerald-600
            {% elif resultat.score >= 60 %}text-blue-600
            {% elif resultat.score >= 40 %}text-amber-600
            {% else %}text-red-600{% endif %}">
            {{ resultat.score }}/100
        </span>
    </div>

    <!-- Barre de progression -->
    <div class="w-full bg-gray-100 rounded-full h-2 mb-4">
        <div class="h-2 rounded-full transition-all
            {% if resultat.score >= 80 %}bg-emerald-500
            {% elif resultat.score >= 60 %}bg-blue-500
            {% elif resultat.score >= 40 %}bg-amber-500
            {% else %}bg-red-500{% endif %}"
             style="width: {{ resultat.score }}%">
        </div>
    </div>

    <!-- Points forts -->
    {% if resultat.points_forts %}
    <div class="mb-3">
        <p class="text-xs font-medium text-gray-600 mb-2">Points forts</p>
        <div class="space-y-1">
            {% for point in resultat.points_forts %}
            <div class="flex items-center gap-2 text-xs text-emerald-700">
                <span>✓</span>
                <span>{{ point }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <!-- Conseils -->
    {% if resultat.conseils %}
    <div>
        <p class="text-xs font-medium text-gray-600 mb-2">À améliorer</p>
        <div class="space-y-1">
            {% for conseil in resultat.conseils %}
            <div class="flex items-start gap-2 text-xs text-amber-700 bg-amber-50 px-3 py-1.5 rounded-lg">
                <span>→</span>
                <span>{{ conseil }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

</div>
