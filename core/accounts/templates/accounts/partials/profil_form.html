<form
    hx-post="{% url 'modifier_profil' %}"
    hx-target="#zone-profil"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
    class="space-y-3"
>
    {% csrf_token %}

    <input type="text" name="nom_entreprise"
           placeholder="Nom de l'entreprise"
           value="{{ form.nom_entreprise.value|default:'' }}"
           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

    <input type="text" name="ville"
           placeholder="Ville"
           value="{{ form.ville.value|default:'' }}"
           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

    <input type="text" name="secteur"
           placeholder="Secteur"
           value="{{ form.secteur.value|default:'' }}"
           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

    <input type="text" name="telephone"
           placeholder="Téléphone"
           value="{{ form.telephone.value|default:'' }}"
           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

    <textarea name="description" rows="3"
              placeholder="Description de votre activité"
              class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">{{ form.description.value|default:'' }}</textarea>

    <div>
        <label class="text-xs text-gray-500 mb-1 block">Logo</label>
        <input type="file" name="logo" accept="image/*"
               class="w-full text-sm text-gray-500">
    </div>

    <button type="submit"
            class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-2 rounded-lg text-sm font-medium transition">
        Mettre à jour
    </button>
</form>
