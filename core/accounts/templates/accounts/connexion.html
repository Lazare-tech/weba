{% extends 'base.html' %}

{% block title %}Connexion — WEBA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Connexion</h1>
        <p class="text-gray-500">Accédez à votre tableau de bord</p>
    </div>

    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <input
                    type="text"
                    name="username"
                    placeholder="Nom d'utilisateur"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                >
            </div>
            <div>
                <input
                    type="password"
                    name="password"
                    placeholder="Mot de passe"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                >
            </div>

            {% if form.errors %}
            <p class="text-red-500 text-sm">Identifiants incorrects.</p>
            {% endif %}

            <button
                type="submit"
                class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-3 rounded-xl font-medium transition"
            >
                Se connecter
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Pas encore de compte ?
            <a href="{% url 'accounts:inscription' %}" class="text-emerald-700 hover:underline">
            Créer mon compte gratuitement →

            </a>
        </p>
    </div>
</div>
{% endblock content %}
