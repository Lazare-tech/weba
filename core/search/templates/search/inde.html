{% extends 'base.html' %}

{% block title %}WEBA — Annuaire des entreprises{% endblock %}

{% block content %}

    <!-- En-tête -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-1">Annuaire des entreprises</h1>
        <p class="text-gray-500">Trouvez et connectez-vous avec des entreprises de la sous-région</p>
    </div>

    <!-- Barre de recherche -->
    <div class="relative mb-6">
        <input
            type="text"
            name="q"
            placeholder="Rechercher une entreprise..."
            hx-get="/recherche/"
            hx-trigger="keyup delay:300ms"
            hx-target="#resultats"
            class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white"
        >
        <span class="absolute left-3 top-3.5 text-gray-400">🔍</span>
    </div>

    <!-- Liste des entreprises -->
    <div
        id="resultats"
        hx-get="/liste/"
        hx-trigger="load, refresh"
        class="space-y-3"
    >
        <div class="text-center text-gray-400 py-8">Chargement...</div>
    </div>

    <!-- Section ajout -->
    <div x-data="{ ouvert: false }" class="mt-10">

        <div class="flex justify-between items-center border-t border-gray-200 pt-6 mb-4">
            <h2 class="text-xl font-semibold text-gray-800">Ajouter une entreprise</h2>
            <button
                @click="ouvert = !ouvert"
                x-text="ouvert ? '✕ Fermer' : '+ Ajouter'"
                class="bg-emerald-700 hover:bg-emerald-800 text-white text-sm px-4 py-2 rounded-lg transition"
            ></button>
        </div>

        <div
            x-show="ouvert"
            x-transition
            id="zone-formulaire"
            hx-get="/ajouter/"
            hx-trigger="load"
            class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm"
        >
        </div>

    </div>

{% endblock content %}
