{% if succes %}
<div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg mb-4 text-sm">
    ✅ Entreprise ajoutée avec succès !
</div>
{% endif %}

<form
    hx-post="/ajouter/"
    hx-target="#zone-formulaire"
    hx-swap="innerHTML"
    hx-on::after-request="htmx.trigger('#resultats', 'refresh')"
    class="space-y-4"
>
    {% csrf_token %}

    <div x-data="{ nom: '', max: 50 }">
        <div class="flex justify-between mb-1">
            <label class="text-sm text-gray-600">Nom de l'entreprise</label>
            <span class="text-sm" :class="nom.length > max ? 'text-red-500' : 'text-gray-400'"
                  x-text="nom.length + '/' + max"></span>
        </div>
        <input
            type="text"
            name="nom"
            placeholder="Ex: Menuiserie Kaboré"
            x-model="nom"
            class="w-full px-4 py-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm"
            :class="nom.length > max ? 'border-red-400' : 'border-gray-200'"
        >
        {% if form.nom.errors %}
            <p class="text-red-500 text-xs mt-1">{{ form.nom.errors.0 }}</p>
        {% endif %}
    </div>

    <div>
        <label class="text-sm text-gray-600 mb-1 block">Secteur d'activité</label>
        <input
            type="text"
            name="secteur"
            placeholder="Ex: Artisanat, Transport, Santé..."
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm"
        >
        {% if form.secteur.errors %}
            <p class="text-red-500 text-xs mt-1">{{ form.secteur.errors.0 }}</p>
        {% endif %}
    </div>

    <div>
        <label class="text-sm text-gray-600 mb-1 block">Ville</label>
        <input
            type="text"
            name="ville"
            placeholder="Ex: Ouagadougou"
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm"
        >
        {% if form.ville.errors %}
            <p class="text-red-500 text-xs mt-1">{{ form.ville.errors.0 }}</p>
        {% endif %}
    </div>

    <button
        type="submit"
        class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-2.5 rounded-lg font-medium transition text-sm"
    >
        Publier l'entreprise
    </button>

</form>
