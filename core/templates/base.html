{% load static tailwind_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WEBA{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base/brand.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% tailwind_css %}
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    {% block extra_head %}{% endblock %}
    <style>
/* Animation de défilement fluide pour captures Full Page */
.template-scroll {
    object-fit: cover;
    object-position: top;
    /* On utilise une durée fixe de 4s pour un mouvement élégant */
    transition: object-position 4s ease-in-out !important;
    image-rendering: -webkit-optimize-contrast;
    height: 100% !important;
    width: 100% !important;
}

/* Déclencheur au survol */
.group:hover .template-scroll {
    object-position: bottom !important;
}
    /* Optionnel : Style pour le bouton actif */
    .active-cat {
        background: #0f172a !important; /* slate-900 */
        color: white !important;
    }
</style>
</head>
<body class="bg-gray-50">

    <header>{% include 'navbar/navbar.html' %}</header>

    <main class="pt-16 min-h-screen">
        {% block content %}{% endblock content %}
    </main>

    <footer>{% include 'footer/footer.html' %}</footer>

   <script src="{% static 'js/style.js' %}"></script>
</body>
</html>
