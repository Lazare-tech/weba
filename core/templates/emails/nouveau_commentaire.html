<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; color: #333; }
        .header { background: #0F6E56; padding: 30px; text-align: center; border-radius: 12px 12px 0 0; }
        .header h1 { color: white; margin: 0; font-size: 20px; }
        .body { background: #f9f9f9; padding: 30px; border-radius: 0 0 12px 12px; }
        .commentaire { background: white; border-left: 4px solid #0F6E56; padding: 15px; border-radius: 0 8px 8px 0; margin: 15px 0; }
        .btn { display: inline-block; background: #0F6E56; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; margin: 20px 0; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Nouveau commentaire sur votre article</h1>
    </div>
    <div class="body">
        <p>Bonjour <strong>{{ username }}</strong>,</p>
        <p>
            <strong>{{ auteur }}</strong> a laissé un commentaire sur votre article
            <strong>"{{ titre_article }}"</strong> :
        </p>
        <div class="commentaire">
            <p style="margin: 0; font-style: italic;">"{{ contenu }}"</p>
        </div>
        <a href="{{ dashboard_url }}" class="btn">Répondre au commentaire →</a>
    </div>
    <div class="footer">
        <p>WEBA — La visibilité digitale pour l'Afrique de l'Ouest</p>
    </div>
</body>
</html>
