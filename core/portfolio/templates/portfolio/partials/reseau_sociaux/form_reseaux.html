<form hx-post="{% url 'portfolio:modifier_reseaux' %}" hx-target="#zone-reseaux" class="space-y-3 animate-in fade-in zoom-in duration-200">
    {% csrf_token %}
    <input type="text" name="whatsapp" value="{{ portfolio.whatsapp|default:'' }}" placeholder="WhatsApp (ex: 22670000000)" 
           class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-emerald-500 outline-none">
    
    <input type="url" name="facebook" value="{{ portfolio.facebook|default:'' }}" placeholder="Lien Facebook" 
           class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-emerald-500 outline-none">

    <input type="url" name="linkedin" value="{{ portfolio.linkedin|default:'' }}" placeholder="Lien LinkedIn" 
           class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-emerald-500 outline-none">
    
    <input type="url" name="instagram" value="{{ portfolio.instagram|default:'' }}" placeholder="Lien Instagram" 
           class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-emerald-500 outline-none">

    <div class="flex gap-2 pt-1">
        <button type="submit" class="flex-1 bg-emerald-600 text-white py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 transition">Enregistrer</button>
        <button type="button" hx-get="{% url 'portfolio:modifier_reseaux' %}?cancel=1" hx-target="#zone-reseaux" class="px-3 py-2 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-bold uppercase">Annuler</button>
    </div>
</form>
