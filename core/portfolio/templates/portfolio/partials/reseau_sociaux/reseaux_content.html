<div class="grid grid-cols-4 gap-3">
    {# WhatsApp #}
    {% if portfolio.whatsapp %}
        <a href="https://wa.me/{{ portfolio.whatsapp }}" target="_blank" 
           class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center hover:bg-emerald-600 hover:text-white transition-all shadow-sm active:scale-90">
            <i class="fab fa-whatsapp text-xl"></i>
        </a>
    {% else %}
        <div class="w-12 h-12 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center border border-dashed border-slate-200">
            <i class="fab fa-whatsapp text-xl"></i>
        </div>
    {% endif %}

    {# Facebook - FIX APPLIQUÉ ICI #}
    {% if portfolio.facebook %}
        <a href="{{ portfolio.facebook }}" target="_blank" 
        class="w-12 h-12 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center hover:bg-blue-700 hover:text-white transition-all shadow-sm active:scale-95">
            <i class="fab fa-facebook-f text-xl"></i>
        </a>
    {% else %}
        <div class="w-12 h-12 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center border border-dashed border-slate-200">
            <i class="fab fa-facebook-f text-xl"></i>
        </div>
    {% endif %}

    {# LinkedIn #}
    {% if portfolio.linkedin %}
        <a href="{{ portfolio.linkedin }}" target="_blank" 
           class="w-12 h-12 bg-sky-50 text-sky-700 rounded-full flex items-center justify-center hover:bg-sky-700 hover:text-white transition-all shadow-sm active:scale-90">
            <i class="fab fa-linkedin-in text-xl"></i>
        </a>
    {% else %}
        <div class="w-12 h-12 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center border border-dashed border-slate-200">
            <i class="fab fa-linkedin-in text-xl"></i>
        </div>
    {% endif %}

    {# Instagram #}
    {% if portfolio.instagram %}
        <a href="{{ portfolio.instagram }}" target="_blank" 
           class="w-12 h-12 bg-pink-50 text-pink-600 rounded-full flex items-center justify-center hover:bg-pink-600 hover:text-white transition-all shadow-sm active:scale-90">
            <i class="fab fa-instagram text-xl"></i>
        </a>
    {% else %}
        <div class="w-12 h-12 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center border border-dashed border-slate-200">
            <i class="fab fa-instagram text-xl"></i>
        </div>
    {% endif %}
</div>
