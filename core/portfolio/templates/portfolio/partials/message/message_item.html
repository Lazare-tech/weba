<div id="message-{{ m.id }}" class="group p-6 rounded-3xl border transition-all {% if not m.lu %}bg-emerald-50/50 border-emerald-100 shadow-sm{% else %}bg-white border-slate-100{% endif %}">
    <div class="flex justify-between items-start mb-3">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600 text-sm">
                {{ m.nom|slice:":1" }}
            </div>
            <div>
                <h4 class="font-bold text-slate-900 text-sm">{{ m.nom }}</h4>
                <p class="text-[10px] text-slate-400 font-medium">{{ m.date|date:"d M Y · H:i" }}</p>
            </div>
        </div>
        <div class="flex gap-2">
            {% if not m.lu %}
            <button hx-post="{% url 'portfolio:marquer_lu' m.id %}" hx-target="#message-{{ m.id }}" hx-swap="outerHTML"
                    class="p-2 text-emerald-600 hover:bg-emerald-100 rounded-xl transition shadow-sm bg-white border border-emerald-100">
                <i class="fas fa-check text-xs"></i>
            </button>
            {% endif %}
            <button onclick="confirmerSuppression(this)" data-url="{% url 'portfolio:supprimer_message' m.id %}" data-target="#message-{{ m.id }}"
                    class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition">
                <i class="fas fa-trash-alt text-xs"></i>
            </button>
        </div>
    </div>
    <p class="text-slate-600 text-sm leading-relaxed mb-4 italic">"{{ m.message }}"</p>
    <div class="flex flex-wrap gap-3">
        <a href="mailto:{{ m.email }}" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-emerald-600 transition flex items-center gap-2">
            <i class="fas fa-reply"></i> Répondre par Email
        </a>
        {% if m.telephone %}
        <a href="tel:{{ m.telephone }}" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-emerald-600 transition flex items-center gap-2">
            <i class="fas fa-phone"></i> {{ m.telephone }}
        </a>
        {% endif %}
    </div>
</div>
