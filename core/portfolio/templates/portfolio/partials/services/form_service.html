{% load static %}
<div class="bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-slate-200 mb-6 animate-in fade-in slide-in-from-top-4"
     {% if service %}id="service-{{ service.id }}"{% endif %}>
    
    <h3 class="text-sm font-bold text-slate-700 uppercase mb-4 flex items-center">
        <i data-lucide="{% if service %}edit-3{% else %}plus-circle{% endif %}" class="w-4 h-4 mr-2"></i> 
        {% if service %}Modifier le service{% else %}Nouveau Service{% endif %}
    </h3>
    
    <form hx-post="{% if service %}{% url 'portfolio:modifier_service' service.id %}{% else %}{% url 'portfolio:ajouter_service' %}{% endif %}" 
          hx-encoding="multipart/form-data"
          {% if service %}
            hx-target="#service-{{ service.id }}" 
            hx-swap="outerHTML"
          {% else %}
            hx-target="#liste-services" 
            hx-swap="afterbegin"
          {% endif %}
          hx-on::after-request="{% if not service %}if(event.detail.successful) { this.reset(); document.getElementById('form-service').innerHTML=''; }{% endif %}"
          class="space-y-4">
        
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-1 flex flex-col items-center justify-center">
                {% with preview_id=service.id|default:'new_serv' %}
                <div id="service-preview-{{ preview_id }}" class="w-24 h-24 bg-white rounded-xl border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-300 overflow-hidden relative shadow-sm">
                    {% if service.image %}
                        <img src="{{ service.image.url }}" class="w-full h-full object-cover">
                    {% else %}
                        <i data-lucide="camera" class="w-8 h-8"></i>
                    {% endif %}
                </div>
                <label class="mt-2 cursor-pointer text-emerald-600 text-[10px] font-black uppercase tracking-widest hover:text-emerald-700 transition">
                    Choisir l'image
                    <input type="file" name="image" accept="image/*" class="hidden" 
                           onchange="previewImage(this, 'service-preview-{{ preview_id }}')">
                </label>
                {% endwith %}
            </div>

            <div class="col-span-2 space-y-4">
                <input type="text" name="titre" value="{{ service.titre|default:'' }}" required placeholder="Titre du service (ex: Consultation Juridique)"
                       class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none outline-none">
                
                <input type="text" name="prix" value="{{ service.prix|default:'' }}" placeholder="Prix / Tarif (ex: 10 000 FCFA / Heure)"
                       class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none outline-none">
            </div>

            <div class="col-span-3">
                <textarea name="description" rows="3" required placeholder="Décrivez votre service..."
                          class="w-full px-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none outline-none">{{ service.description|default:'' }}</textarea>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-2">
            {% if service %}
                <button type="button" 
                        hx-get="{% url 'portfolio:modifier_service' service.id %}?cancel=1"
                        hx-target="#service-{{ service.id }}"
                        hx-swap="outerHTML"
                        class="px-4 py-2 text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-slate-700 transition">
                    Annuler
                </button>
            {% else %}
                <button type="button" 
                        onclick="document.getElementById('form-service').innerHTML=''"
                        class="px-4 py-2 text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-slate-700 transition">
                    Annuler
                </button>
            {% endif %}

            <button type="submit" class="bg-emerald-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center transition shadow-lg shadow-emerald-100 hover:bg-emerald-800 active:scale-95">
                <i data-lucide="save" class="w-4 h-4 mr-2"></i> Sauvegarder
            </button>
        </div>
    </form>
</div>
<script>lucide.createIcons();</script>
