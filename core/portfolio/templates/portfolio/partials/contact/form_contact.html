<form
    hx-post="{% url 'portfolio_public' portfolio.slug %}"
    hx-target="#zone-contact"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
    class="space-y-4"
>
    {% csrf_token %}

    <div class="grid grid-cols-2 gap-4">
        <div>
            <input type="text" name="nom" placeholder="Votre nom *"
                   class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div>
            <input type="email" name="email" placeholder="Email *"
                   class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
    </div>

    <input type="text" name="telephone" placeholder="Téléphone (optionnel)"
           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

    <textarea name="message" rows="4" placeholder="Votre message *"
              class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>

    <button type="submit"
            class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-3 rounded-xl font-medium transition">
        Envoyer le message
    </button>
</form>
