<form
    hx-post="{% url 'modifier_portfolio' %}"
    hx-target="#zone-portfolio"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
    class="space-y-4"
>
    {% csrf_token %}

    <div class="space-y-3">
        <label class="block text-xs font-bold uppercase text-gray-400">Identité visuelle</label>
        
        <input type="text" name="titre"
               placeholder="Ex: Menuisier professionnel à Ouagadougou"
               value="{{ form.titre.value|default:'' }}"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

        <textarea name="bio" rows="4" placeholder="Décrivez votre activité (Remplacez le Lorem Ipsum)"
                  class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">{{ form.bio.value|default:'' }}</textarea>
    </div>

    <div class="space-y-2">
        <label class="block text-xs font-bold uppercase text-gray-400">Modèle de site (Template)</label>
        <select name="template_choisi"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-slate-50 focus:ring-2 focus:ring-emerald-500">
            <option value="minimal" {% if form.template_choisi.value == 'minimal' %}selected{% endif %}>Minimaliste (Expert)</option>
            <option value="showcase" {% if form.template_choisi.value == 'showcase' %}selected{% endif %}>Showcase (Créatif)</option>
            <option value="business" {% if form.template_choisi.value == 'business' %}selected{% endif %}>Business / Accélérateur</option>
        </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <input type="text" name="telephone" placeholder="Téléphone"
               value="{{ form.telephone.value|default:'' }}"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">

        <input type="text" name="whatsapp" placeholder="WhatsApp"
               value="{{ form.whatsapp.value|default:'' }}"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>

    <div class="p-4 bg-slate-50 rounded-xl space-y-3">
        <div>
            <label class="text-xs text-gray-500 mb-1 block font-medium">Couleur d'accentuation</label>
            <select name="couleur"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="emerald" {% if form.couleur.value == 'emerald' %}selected{% endif %}>Vert Émeraude (Sérieux)</option>
                <option value="blue" {% if form.couleur.value == 'blue' %}selected{% endif %}>Bleu Royal (Confiance)</option>
                <option value="purple" {% if form.couleur.value == 'purple' %}selected{% endif %}>Violet (Luxe)</option>
                <option value="orange" {% if form.couleur.value == 'orange' %}selected{% endif %}>Orange (Énergie)</option>
                <option value="red" {% if form.couleur.value == 'red' %}selected{% endif %}>Rouge (Action)</option>
            </select>
        </div>

        <div>
            <label class="text-xs text-gray-500 mb-1 block font-medium">Photo de profil ou Logo</label>
            <input type="file" name="photo" accept="image/*"
                   class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
        </div>
    </div>

    <button type="submit"
            class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-3 rounded-xl text-sm font-bold transition shadow-lg shadow-emerald-100">
        Mettre à jour mon Portfolio
    </button>
</form>
