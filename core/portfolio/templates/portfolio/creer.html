{% extends 'base.html' %}

{% block title %}Créer mon portfolio — WEBA{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">
            Créez votre portfolio
        </h1>
        <p class="text-gray-500">
            Exposez vos réalisations et attirez plus de clients
        </p>
    </div>

    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="text-sm font-medium text-gray-700 mb-1 block">
                    Titre professionnel *
                </label>
                <input type="text" name="titre"
                       placeholder="Ex: Menuisier professionnel à Ouagadougou"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>

            <div>
                <label class="text-sm font-medium text-gray-700 mb-1 block">
                    Présentation
                </label>
                <textarea name="bio" rows="4"
                          placeholder="Décrivez votre activité, votre expérience..."
                          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 mb-1 block">Téléphone</label>
                    <input type="text" name="telephone"
                           placeholder="+226 XX XX XX XX"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 mb-1 block">WhatsApp</label>
                    <input type="text" name="whatsapp"
                           placeholder="+226 XX XX XX XX"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <div>
                <label class="text-sm font-medium text-gray-700 mb-1 block">
                    Couleur du portfolio
                </label>
                <select name="couleur"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="emerald">Vert</option>
                    <option value="blue">Bleu</option>
                    <option value="purple">Violet</option>
                    <option value="orange">Orange</option>
                    <option value="red">Rouge</option>
                </select>
            </div>

            <div>
                <label class="text-sm font-medium text-gray-700 mb-1 block">
                    Photo de profil
                </label>
                <input type="file" name="photo" accept="image/*"
                       class="w-full text-sm text-gray-500">
            </div>

            <button type="submit"
                    class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-3 rounded-xl font-medium transition">
                Créer mon portfolio →
            </button>
        </form>
    </div>
</div>
{% endblock content %}
