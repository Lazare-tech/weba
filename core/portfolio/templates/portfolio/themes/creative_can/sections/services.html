<section id="services" class="py-24 px-6" style="background-color: var(--t-bg);">
    <div class="max-w-7xl mx-auto">
        <div class="grid md:grid-cols-3 gap-8">
            {% for s in services %}
            <div class="p-10 rounded-[2.5rem] bg-white/5 border border-white/10 hover:bg-white/10 transition-all group {% if forloop.counter == 2 %}bg-gradient-to-br from-[var(--t-primary)] to-[var(--t-accent)] transform md:-translate-y-8 shadow-2xl{% endif %}">
                <i class="fas {% if forloop.counter == 1 %}fa-vector-square{% elif forloop.counter == 2 %}fa-layer-group text-white{% else %}fa-magic{% endif %} text-3xl mb-8 block group-hover:scale-125 transition-transform" 
                   style="{% if forloop.counter != 2 %}color: var(--t-primary);{% endif %}"></i>
                <h3 class="font-head text-2xl font-bold mb-4 italic {% if forloop.counter == 2 %}text-white{% endif %}">{{ s.titre }}</h3>
                <p class="leading-relaxed font-light {% if forloop.counter == 2 %}text-white/80{% else %}text-slate-400{% endif %}">
                    {{ s.description }}
                </p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
