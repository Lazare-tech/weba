<section class="py-24 bg-emerald-600 relative overflow-hidden">
    <div class="mx-auto max-w-7xl px-6 lg:px-8 relative z-10">
        
        <!-- Affichage des alertes (Success/Error) -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-8 p-4 rounded-xl bg-white/20 text-white text-sm font-bold backdrop-blur-md border border-white/20">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="flex flex-col lg:flex-row items-center justify-between gap-12">
            <div class="max-w-xl text-center lg:text-left">
                <h2 class="text-white text-3xl md:text-5xl font-black leading-tight">Restez à la pointe.</h2>
                <p class="text-emerald-100 mt-4 text-lg">Rejoignez +2 000 entrepreneurs et recevez nos conseils.</p>
            </div>
            
            <div class="w-full max-w-md">
                <!-- Action pointant vers la vue newsletter_subscribe -->
                <form id="newsletter-form" action="{% url 'aapmarket:newsletter_subscribe' %}" method="POST" class="flex flex-col sm:flex-row gap-4 p-2 bg-white/10 rounded-2xl">
                    {% csrf_token %}
                    
                    <input type="email" 
                           name="email" 
                           placeholder="votre@email.com" 
                           required
                           class="flex-grow bg-white rounded-xl px-6 py-4 outline-none text-slate-900 font-medium border-2 border-transparent focus:border-slate-900 transition-all">
                    
                    <button type="submit" 
                            class="bg-slate-900 text-white font-bold px-8 py-4 rounded-xl hover:bg-black transition-all cursor-pointer shadow-lg active:scale-95">
                        S'inscrire
                    </button>
                </form>
                <div id="newsletter-status" class="hidden"></div>
                <p class="text-[10px] text-emerald-200 mt-4 text-center lg:text-left uppercase font-black tracking-widest opacity-60">
                    Pas de spam. Désinscription en un clic.
                </p>
            </div>
        </div>
    </div>
</section>
